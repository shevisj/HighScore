services:
  highscore:
    build:
      context: .
      dockerfile: ./Dockerfile
      args:
        - http_proxy
        - https_proxy
        - no_proxy
    image: highscore:latest
    ports:
      - '8081:8081'
    depends_on:
      - "mongo"
    stdin_open: true
    tty: true
    volumes:
      - ./custom:/opt/custom
      - ./config/ban.json:/opt/config/ban.json
    environment:
      - HIGHSCORE_DB_URL=mongodb://mongo:27017/highscore
      - HIGHSCORE_TITLE=
      - HIGHSCORE_DESCRIPTION=
      - HIGHSCORE_LOGO_URL=
      - HIGHSCORE_FAVICON_URL=
      - HIGHSCORE_CSS_URL=
      # Optional write protection for POST/PUT/DELETE /api/scores. Leave the
      # password empty to keep writes open. Set HIGHSCORE_WRITE_TOKEN=true to
      # require a payload-bound HMAC token instead of the raw password. Supply
      # the secret from the host environment, e.g.:
      #   HIGHSCORE_WRITE_PASSWORD=$(openssl rand -hex 16) docker compose up
      - HIGHSCORE_WRITE_PASSWORD=${HIGHSCORE_WRITE_PASSWORD:-}
      - HIGHSCORE_WRITE_TOKEN=${HIGHSCORE_WRITE_TOKEN:-false}

  mongo:
    image: mongo:7.0
    volumes:
      - data:/data/db

volumes:
  data:
